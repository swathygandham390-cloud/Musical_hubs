<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Page Title</title>
    <style> 
     *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            background-image: url('music.avif');
            background-size: cover;
            background-position: center;
        }
        .login-section{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
        }
        form{
            background-color: white;
            background-image: url('music3.avif');
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        input[type="text"], input[type="password"]{
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button{
            width: 100%;
            padding: 10px;
            background-color: #ff9800;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
        }
        button:hover{
            background-color: #e68900;
        }
        .form-actions{
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }
        .secondary-btn{
            background-color: #777;
        }
        .secondary-btn:hover{
            background-color: #5f5f5f;
        }
        .extra-text{
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            color: green;
            margin-top: 10px;
        }
        .extra-text a{
            color: #f8d406;
            text-decoration: none;
        }
        .extra-text a:hover{
            text-decoration: underline;
        }
        footer{
                text-align:center;
                padding:20px 0;
                background-color:#1a1a1a;
                color:white;
     }
.navbar{
                background-color: #1a1a1a;
                color:white;
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 15px 30px;
                position: sticky;
                top:0;
                z-index: 1000;
                gap:20px;
            }
            .remember-me{
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 14px;
                margin-bottom: 20px;
                color: #129934;
            }
            .forgot-password{
                color: #f83319;
                font-weight: bold;
                text-decoration: none;
                font-size: 14px;
            }
            
            .menu a{
                color:white;
                text-decoration: none;
                margin: 0 15px;
                font-weight: 500;
            }

            .logo{
                font-size: 24px;
                font-weight: bold;
                color: #ff9800;
                display: flex;
                align-items: center;
                gap: 10px;
            }
            .logo img{
                width: 80px;
                height: 80px;
            }
            .img{
                width:100%;
                height:100%;
                object-fit:cover;
            }
            

    </style>
</head>
<body >
    <div class="navbar" >
            <div class="logo"><img src="logo.png" alt="Logo">Harmony Hub</div>
            <div class="menu">
                <a href="index.html">Home</a>
                <a href="aboutus.html"> About Us</a>
                <a href="producthighlights.html">Highlights</a>
                <a href="features.html">Features</a>
                <a href="testimonial.html">Testimonials</a>
                <a href="contact.html">Contact</a>
                <a href="login.html">Login</a>
                <a href="signup.html">signup</a>
            </div> 
            </div>
            <section class="login-section">
                <form>
                    <input type="text" placeholder="Username" required>
                    <input type="password" placeholder="Password" required>
                    <div class="remember-me">
               
                        <label> <input type="checkbox" id="remember"> Remember me</label>
                        <a href="signup.html" class="forgot-password">Forgot Password?</a>

                    </div>
                    <div class="form-actions">
                        <button type="submit">Login</button>
                        <button type="reset" class="secondary-btn">Reset</button>
                    </div>
                    <div class="extra-text">
                        Don't have an account? <a href="signup.html">Sign up</a>
                    </div>
                </form>
            </section>
            <footer>
                <p>&copy; 2024 Harmony Hub. All rights reserved.</p>
            </footer>
</body>
</html>
