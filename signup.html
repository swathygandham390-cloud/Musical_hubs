                <p>Name</p>
                <input class="i1" type="text" id="name" name="" placeholder="Enter Your Name" required>
                 <p>Email</p>
                <input class="i2" type="email" id="email" name="" placeholder="Enter Your Email" required>
                 <p>Password</p>
                <input class="i3" type="password" id="password" name="" placeholder="Create Password" required>

              </div>

                  <script>
                    function validateForm(){

                        let name=document.getElementById("name");
                        let email=document.getElementById("email");
                        let password=document.getElementById("password");
                        let confirmPassword=document.getElementById("confirmPassword");

                        let isValid=true;

                        name.classList.remove("error");
                           email.classList.remove("error");
                              password.classList.remove("error");
                                 confirmPassword.classList.remove("error");
                    
                                 if(name.value.trim()===""){
                                    alert("Enter your name");
                                    name.classList.add("error");
                                    isValid=false;
                                 }

                                  if(email.value.trim()===""){
                                    alert("Enter your email");
                                    email.classList.add("error");
                                    isValid=false;
                                 }

                                  if(password.value.trim()===""){
                                    alert("Enter your password");
                                    password.classList.add("error");
                                    isValid=false;
                                 }

                                  if(confirmPassword.value.trim()===""){
                                    alert("Re-enter your confirmpassword ");
                                    confirmPassword.classList.add("error");
                                    isValid=false;
                                 }

                                 if(isValid ===false){
                                  return false;
                    }

                                 if(password.value !== confirmPassword.value){
                                    alert("Both the passwords are not same!");
                                    password.classList.add("error");
                                     confirmPassword.classList.add("error");
                                     confirmPassword.value="";
                                     return false;
                                 }

                                 alert("Sign Up Successful!");
                                 return true;

                                }

                  </script>
