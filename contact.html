<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Contact Us</title>
        <style>
            *{
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body{
                font-family: Arial, sans-serif;
                background-color: #f4f4f4;
            }
            header{
                
                padding:0px;
                
                margin-bottom: 20px;
            }
            .navbar{
                background-color: #1a1a1a;
                color:white;
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 5px 30px;
                position: sticky;
                top:0;
                z-index: 1000;
                gap:20px;
            }
            
            .menu a{
                color:white;
                text-decoration: none;
                margin: 0 15px;
                font-weight: 500;
            }

            .logo{
                font-size: 24px;
                font-weight: bold;
                color: #ff9800;
                display: flex;
                align-items: center;
                gap:10px;

            }

            .logo img{
                height:60px;
            }

            h1{
                font-size: 38px;
                text-align: center;
            }
            p{
                font-size: 22px;
                margin-top: 10px;
                text-align: center;
            }
            .container{
                width: 90%;
                max-width: 1200px;
                margin: 50px auto;
                display: flex;
                flex-direction: row;
                justify-content: space-between;
                gap: 30px;
                }
            .contact-form{
                width: 50%;
                background:white;
                padding: 30px;
                border-radius: 12px;
                box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            }
            .contact-form h2{
                text-align: center;
                color:#333;
                margin-bottom: 20px;
            }
            label{
                display: block;
                margin-top: 15px;
                font-weight: bold;
            }
            input, textarea{
                width: 100%;
                padding: 12px;
                margin-top: 5px;
                border: 1px solid #ccc;
                border-radius: 5px;
                font-size: 16px;
            }
            textarea{
                resize:none;
            }
            button{
                width: 100%;
                padding: 15px;
                margin-top: 20px;
                background-color: #333;
                color: #fff;
                border: none;
                border-radius: 5px;
                font-size: 18px;
                cursor: pointer;
            }
            button:hover{
                background-color: #555;
            }
            .contact-details{
                width: 50%;
                background:white;
                padding: 30px;
                border-radius: 12px;
                box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            }
            .contact-details h2{
                text-align: center;
                color:#333;
                margin-bottom: 20px;
            }
            .contact-details p{
                font-size: 16px;
                margin-bottom: 20px;
                line-height: 1.6;    
            }
            .contact-details strong{
                font-weight: bold;
            }

            .map{
                width: 100%;
                height: 300px;
                border-radius: 12px;
                margin-top: 20px;
            }
            .map iframe{
                width: 100%;
                height: 100%;
                border: none;
                border-radius: 12px;
            }

            footer{
                background-color: #333;
                color: #fff;
                text-align: center;
                padding: 20px;
                }

        </style>
    </head>
    <body>
        <header>
           <div class="navbar">
           
            <div class="logo">
            <img src="logo.webp" rel="stylesheet"> Harmony Hub </div>
            <div class="menu">
                <a href="index.html">Home</a>
                <a href="aboutus.html"> About Us</a>
                <a href="producthighlights.html">Highlights</a>
                <a href="features.html">Features</a>
                <a href="testimonial.html">Testimonials</a>
                <a href="contact.html">Contact</a>
                <a href="login.html">Login</a>
                <a href="signup.html">SignUp</a>
            </div>
        </div>
  
        </header>
        <h1 class="h1">Contact Us</h1>
            <p class="p">We'd love to hear from you!</p>
        <div class="container">
            <div class="contact-form">
                <h2>Send us a message</h2>
                <form action="submit.html">
                    <label for="name">Name <span style="color: red;">*</span></label>
                    <input type="text" id="name" name="name" required>
                    <label for="phone">Phone <span style="color: red;">*</span></label>
                    <input type="tel" id="phone" name="phone" required pattern="[0-9]{10}" placeholder="Enter 10-digit phone number">
                    <label for="email">Email <span style="color: red;">*</span></label>
                    <input type="email" id="email" name="email" required>
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5"></textarea>
                    <button type="submit">Send Message</button>
                </form>
            </div>
            <div class="contact-details">
                <h2>Our Details</h2>
                <p><strong>Address:</strong> bangaluru, india</p>
                <p><strong>Phone:</strong> +91 9876543210</p>
                <p><strong>Email:</strong> support@harmonyhub.com</p>
                <div class="map">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3888.1234567890123!2d77.5946!3d12.9716!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bae123456789012%3A0x123456789abcdef0!2sBangalore%2C%20Karnataka%2C%20India!5e0!3m2!1sen!2sus!4v1234567890123" allowfullscreen="" loading="fast"></iframe>
            </div>
            </div>
        </div>
        <footer>
            <p>&copy; 2026 Harmony Hub. All rights reserved.</p>
        </footer>
    </body>
</html>
